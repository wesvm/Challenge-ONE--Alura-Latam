<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Encriptador y desencriptador de texto — Challenge ONE Alura Latam">
  <title>Conversor de Texto — Challenge ONE</title>

  <link rel="icon" type="image/x-icon" href="./assets/icons/favicon.ico">
  <link rel="stylesheet" href="./src/css/main.css">
  <link rel="stylesheet" href="./src/css/responsive.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>

<body>

  <main>
    <div class="main-container">

      <section class="input-section">
        <div class="logo-wrapper">
          <img src="./assets/images/logo.png" alt="Logo Alura Latam">
        </div>

        <div class="form-wrapper">
          <div class="textarea-wrapper">
            <textarea id="input-text" class="txt-area" placeholder="Ingrese su texto aqui:"
              aria-label="Texto a encriptar o desencriptar"></textarea>

            <div class="input-hint">
              <span class="material-symbols-outlined" aria-hidden="true">info</span>
              <p>Solo letras minúsculas y sin acentos</p>
            </div>
          </div>

          <div class="btn-group">
            <button class="btn btn--primary" id="btn-encrypt" type="button">Encriptar</button>
            <button class="btn btn--secondary" id="btn-decrypt" type="button">Desencriptar</button>
          </div>
        </div>
      </section>

      <section class="output-section">
        <div class="output-card">

          <div class="output-empty" id="output-empty">
            <div id="empty-initial">
              <img src="./assets/images/person.png" alt="">
              <h3>Ningún mensaje fue encontrado</h3>
              <p>Ingresa el texto que deseas encriptar o desencriptar</p>
            </div>
            <div id="empty-hint" hidden>
              <span class="material-symbols-outlined">edit_note</span>
              <p id="empty-hint-text">Escribe algo para encriptar</p>
            </div>
          </div>

          <div class="output-result" id="output-result" hidden>
            <textarea id="output-text" class="txt-area" aria-label="Resultado" aria-live="polite" disabled></textarea>

            <button class="btn btn--copy" id="btn-copy" type="button">
              <span class="material-symbols-outlined" aria-hidden="true">content_copy</span>
              Copiar
            </button>
          </div>

        </div>
      </section>

    </div>
  </main>

  <footer class="site-footer">
    <p>© 2023, Challenge ONE — <a href="https://www.aluracursos.com" target="_blank" rel="noopener">Alura Latam</a></p>
    <p>Design by <a href="https://app.aluracursos.com/user/samuelwalter2001" target="_blank" rel="noopener">Walter
        Vilca</a> — All rights reserved</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard-polyfill/2.8.6/clipboard-polyfill.js"></script>
  <script type="module" src="./src/js/app.js"></script>

</body>

</html>
